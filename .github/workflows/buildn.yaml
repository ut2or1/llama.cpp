# .github/workflows/buildn.yaml
# Windows AMD64 Vulkan build using x64-windows-llvm-release toolchain
# with Visual Studio 2026 environment on windows-latest runner

name: Build Windows AMD64 Vulkan

on:
  workflow_dispatch:  # allows manual triggering
  push:
    branches:
      - master
    paths:
      - '.github/workflows/buildn.yaml'
      - '**/CMakeLists.txt'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.glsl'
      - '**/*.comp'
      - '**/*.wgsl'
      - 'cmake/x64-windows-llvm.cmake'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/buildn.yaml'
      - '**/CMakeLists.txt'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.glsl'
      - '**/*.comp'
      - '**/*.wgsl'
      - 'cmake/x64-windows-llvm.cmake'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  VULKAN_SDK_VERSION: "1.4.313.2"
  GGML_NLOOP: 3
  GGML_N_THREADS: 1
  LLAMA_LOG_COLORS: 1
  LLAMA_LOG_PREFIX: 1
  LLAMA_LOG_TIMESTAMPS: 1

jobs:
  windows-latest-vulkan-llvm:
    name: Windows AMD64 Vulkan (LLVM/Clang)
    runs-on: windows-latest  # Windows Server 2025 with Visual Studio 2026 [[10]][[14]]

    defaults:
      run:
        shell: bash  # Use bash for consistent path handling

    env:
      # LLVM/Clang toolchain paths (adjust if needed based on runner image)
      LLVM_BIN: "C:/Program Files/LLVM/bin"
      VULKAN_SDK: "C:/VulkanSDK/${{ env.VULKAN_SDK_VERSION }}"

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-vulkan-llvm-x64
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          max-size: 2G

      - name: Install Ninja
        run: |
          choco install ninja --no-progress -y
          echo "C:/ProgramData/chocolatey/bin" >> $GITHUB_PATH

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.2.0  # [[20]][[21]]
        with:
          vulkan-version: ${{ env.VULKAN_SDK_VERSION }}
          install-glslc: true
          cache: true

      - name: Verify Vulkan installation
        run: |
          echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
          echo "$VULKAN_SDK/Bin" >> $GITHUB_PATH
          vulkaninfo --summary || echo "vulkaninfo check completed"
          glslc --version

      - name: Setup LLVM/Clang environment
        run: |
          # Add LLVM to PATH for clang/clang++
          if [ -d "$LLVM_BIN" ]; then
            echo "$LLVM_BIN" >> $GITHUB_PATH
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            # Fallback: use Visual Studio's clang-cl
            echo "CC=clang-cl" >> $GITHUB_ENV
            echo "CXX=clang-cl" >> $GITHUB_ENV
          fi
          # Verify compiler
          clang --version || clang-cl --version

      - name: Configure CMake with Vulkan + LLVM toolchain
        id: cmake_configure
        run: |
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake \
            -DGGML_VULKAN=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_BACKEND_DL=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_RPC=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_BORINGSSL=ON \
            -DLLAMA_FATAL_WARNINGS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$VULKAN_SDK"

      - name: Build llama.cpp
        id: cmake_build
        run: |
          # Use all available cores for parallel build
          cmake --build build --config Release -j $(nproc)

      - name: Run basic tests
        id: cmake_test
        run: |
          cd build
          ctest -L main -C Release --verbose --timeout 900 \
            --output-on-failure \
            -E "test-llama-archs"  # Skip architecture-specific tests on Windows

      - name: Test Vulkan backend detection
        id: vulkan_test
        run: |
          # Simple test to verify Vulkan backend compiles and detects GPU
          ./build/bin/test-backend-ops -b vulkan 2>&1 | tee vulkan_test.log || true
          # Check if Vulkan was detected (non-fatal, for informational purposes)
          if grep -qi "vulkan\|ggml_vulkan" vulkan_test.log; then
            echo "✓ Vulkan backend detected in test output"
          else
            echo "⚠ Vulkan backend may not have been exercised (non-fatal)"
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llama-windows-x64-vulkan-llvm
          path: |
            build/bin/Release/*.exe
            build/bin/Release/*.dll
            build/lib/Release/*.lib
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows-vulkan-llvm
          path: |
            build/Testing/Temporary/
            vulkan_test.log
          retention-days: 7
