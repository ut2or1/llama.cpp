# .github/workflows/buildn.yaml
# Windows AMD64 Vulkan build using x64-windows-llvm.cmake toolchain
# with Visual Studio 2026 environment on windows-latest runner

name: Build Windows AMD64 Vulkan (LLVM)

on:
  workflow_dispatch:
  push:
    branches: [feat/ci]
    paths:
      - '.github/workflows/buildn.yaml'
      - '**/CMakeLists.txt'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.glsl'
      - '**/*.comp'
      - '**/*.wgsl'
      - 'cmake/x64-windows-llvm.cmake'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/buildn.yaml'
      - '**/CMakeLists.txt'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.glsl'
      - '**/*.comp'
      - '**/*.wgsl'
      - 'cmake/x64-windows-llvm.cmake'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  VULKAN_VERSION: 1.4.313.2
  GGML_NLOOP: 3
  GGML_N_THREADS: 1
  LLAMA_LOG_COLORS: 1
  LLAMA_LOG_PREFIX: 1
  LLAMA_LOG_TIMESTAMPS: 1

jobs:
  windows-latest-vulkan-llvm:
    name: Windows AMD64 Vulkan (LLVM/Clang)
    runs-on: windows-latest

    env:
      CMAKE_DEFINES: >-
        -G "Ninja"
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake
        -DGGML_VULKAN=ON
        -DGGML_NATIVE=OFF
        -DGGML_BACKEND_DL=ON
        -DGGML_CPU_ALL_VARIANTS=ON
        -DGGML_RPC=ON
        -DLLAMA_BUILD_SERVER=ON
        -DLLAMA_BUILD_BORINGSSL=ON
        -DLLAMA_FATAL_WARNINGS=ON

    defaults:
      run:
        shell: powershell

    steps:
      - name: Clone repository
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-vulkan-llvm-x64
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          max-size: 2G

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja --no-progress -y
          echo "C:/ProgramData/chocolatey/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Vulkan SDK
        id: get_vulkan
        run: |
          # Download Vulkan SDK installer
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          
          # Run installer silently
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          
          # Set environment variables for subsequent steps
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"
          
          # Verify installation (PowerShell-safe error handling)
          Write-Host "Vulkan SDK installed at: C:\VulkanSDK\${env:VULKAN_VERSION}"
          $vulkaninfoPath = "C:\VulkanSDK\${env:VULKAN_VERSION}\bin\vulkaninfo.exe"
          if (Test-Path $vulkaninfoPath) {
            & $vulkaninfoPath --summary 2>&1 | Select-Object -First 5
            if ($LASTEXITCODE -ne 0) {
              Write-Host "vulkaninfo returned non-zero exit code (non-fatal)"
            }
          } else {
            Write-Host "Warning: vulkaninfo.exe not found at expected path"
          }

      - name: Configure CMake with Vulkan + LLVM toolchain
        id: cmake_configure
        run: |
          # Expand CMAKE_DEFINES and run cmake
          $defines = $env:CMAKE_DEFINES -split ' ' | Where-Object { $_ -ne '' }
          cmake -S . -B build @defines `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
            -DCMAKE_PREFIX_PATH="C:\VulkanSDK\${env:VULKAN_VERSION}"

      - name: Build llama.cpp
        id: cmake_build
        run: |
          $jobs = [System.Environment]::ProcessorCount
          cmake --build build --config Release -j $jobs

      - name: Run basic tests
        id: cmake_test
        run: |
          cd build
          ctest -L main -C Release --verbose --timeout 900 `
            --output-on-failure `
            -E "test-llama-archs"

      - name: Test Vulkan backend detection
        id: vulkan_test
        run: |
          $testExe = "./build/bin/Release/test-backend-ops.exe"
          if (Test-Path $testExe) {
            & $testExe -b vulkan 2>&1 | Tee-Object -FilePath vulkan_test.log
            if ($LASTEXITCODE -ne 0) {
              Write-Host "test-backend-ops returned exit code: $LASTEXITCODE (checking output anyway)"
            }
            # Check if Vulkan was mentioned in output
            if (Select-String -Path vulkan_test.log -Pattern "vulkan|ggml_vulkan" -Quiet -ErrorAction SilentlyContinue) {
              Write-Host "✓ Vulkan backend detected in test output"
            } else {
              Write-Host "⚠ Vulkan backend may not have been exercised (non-fatal)"
            }
          } else {
            Write-Host "Warning: test-backend-ops.exe not found"
          }

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llama-windows-x64-vulkan-llvm
          path: |
            build/bin/Release/*.exe
            build/bin/Release/*.dll
            build/lib/Release/*.lib
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows-vulkan-llvm
          path: |
            build/Testing/Temporary/
            vulkan_test.log
          retention-days: 14
